<!DOCTYPE html>
<html lang="hi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Photo Enhancer - VisualMax</title><style>
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0f1e,#0a1a2e);color:#fff;}.container{max-width:1200px;margin:0 auto;padding:20px;}header{background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);padding:15px 0;position:sticky;top:0;}.header-flex{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;max-width:1200px;margin:0 auto;padding:0 20px;}.logo{font-size:28px;font-weight:bold;background:linear-gradient(90deg,#ff6b6b,#4ecdc4);-webkit-background-clip:text;background-clip:text;color:transparent;}.menu-container{position:relative;}.menu-icon{font-size:28px;cursor:pointer;background:rgba(255,255,255,0.1);padding:8px 15px;border-radius:30px;}.dropdown-menu{display:none;position:absolute;right:0;top:45px;background:rgba(0,0,0,0.95);border-radius:16px;min-width:180px;border:1px solid rgba(255,255,255,0.15);}.dropdown-menu a{display:block;padding:12px 20px;color:#fff;text-decoration:none;}.dropdown-menu.show{display:block;}h1{text-align:center;margin:30px 0;font-size:36px;background:linear-gradient(90deg,#fff,#4ecdc4);-webkit-background-clip:text;background-clip:text;color:transparent;}.tool-card{background:rgba(255,255,255,0.08);border-radius:24px;padding:30px;max-width:550px;margin:0 auto;}input,select{width:100%;padding:12px;margin:12px 0;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;}button{width:100%;padding:12px;background:linear-gradient(90deg,#ff6b6b,#4ecdc4);border:none;border-radius:12px;color:#fff;font-weight:bold;cursor:pointer;margin:5px 0;}.download-btn{background:linear-gradient(90deg,#4ecdc4,#2c7a6e);}.preview-img{max-width:100%;margin-top:15px;border-radius:12px;}footer{text-align:center;padding:30px;margin-top:50px;border-top:1px solid rgba(255,255,255,0.1);}footer a{color:#4ecdc4;text-decoration:none;margin:0 10px;}
</style></head>
<body>
<header><div class="header-flex"><div class="logo">VisualMax</div><div class="menu-container"><div class="menu-icon" onclick="toggleMenu()">☰ Menu</div><div class="dropdown-menu" id="dropdownMenu"><a href="index.html">Home</a><a href="photo.html">Photo</a><a href="video.html">Video</a><a href="effects.html">Effects</a><a href="blog.html">Blog</a><a href="articles.html">Articles</a><a href="about.html">About</a><a href="contact.html">Contact</a></div></div></div></header>
<div class="container"><h1>📸 AI Photo Enhancer</h1><div class="tool-card"><input type="file" id="photoFile" accept="image/*"><select id="photoMode"><option value="enhance">✨ Enhance Quality</option><option value="upscale">📈 4K Upscale</option><option value="deblur">🔍 Remove Blur</option><option value="denoise">🔇 Remove Noise</option></select><button id="enhanceBtn">⚡ Enhance Now</button><button id="downloadBtn" class="download-btn" style="display:none;">⬇️ Download Photo</button><canvas id="canvas" style="display:none;"></canvas><img id="preview" class="preview-img" style="display:none;"><p style="margin-top:15px;">⚡ Free • No signup • Download your enhanced photo</p></div></div>
<footer><a href="privacy.html">Privacy</a> | <a href="terms.html">Terms</a><p>© 2026 VisualMax</p></footer>
<script>
function toggleMenu(){document.getElementById('dropdownMenu').classList.toggle('show');}
let currentData=null;
document.getElementById('enhanceBtn').addEventListener('click',function(){let f=document.getElementById('photoFile').files[0];if(!f){alert('Select photo');return;}let r=new FileReader();r.onload=function(e){let img=new Image();img.onload=function(){let c=document.getElementById('canvas');let ctx=c.getContext('2d');let mode=document.getElementById('photoMode').value;let w=img.width,h=img.height;if(mode==='upscale'){w*=2;h*=2;}c.width=w;c.height=h;ctx.drawImage(img,0,0,w,h);let d=ctx.getImageData(0,0,w,h);let data=d.data;for(let i=0;i<data.length;i+=4){if(mode==='enhance'){data[i]=Math.min(255,data[i]*1.25);data[i+1]=Math.min(255,data[i+1]*1.25);data[i+2]=Math.min(255,data[i+2]*1.25);}}ctx.putImageData(d,0,0);currentData=c.toDataURL('image/png');let p=document.getElementById('preview');p.src=currentData;p.style.display='block';document.getElementById('downloadBtn').style.display='block';};img.src=e.target.result;};r.readAsDataURL(f);});
document.getElementById('downloadBtn').addEventListener('click',function(){if(currentData){let a=document.createElement('a');a.download='visualmax_photo.png';a.href=currentData;a.click();}else{alert('Enhance photo first');}});
window.onclick=function(e){if(!e.target.matches('.menu-icon')){document.getElementById('dropdownMenu').classList.remove('show');}};
</script></body></html>
